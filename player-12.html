<style>
:root{--ink:#2B3A42;--jade:#1B7A6B;--jadeSoft:#E4F3EF;--jadeLine:#8FC9BE;--peach:#FF8A4C;--peachSoft:#FFEEE1;--gold:#C8A03A;--muted:#7C8990}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#F4FAF8;color:var(--ink);-webkit-font-smoothing:antialiased;padding:18px 14px 40px}
.wrap{max-width:560px;margin:0 auto}
.home{position:fixed;top:14px;left:14px;z-index:10;display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--jade);border:2.5px solid var(--jadeLine);border-radius:999px;padding:8px 14px 8px 12px;text-decoration:none;font-family:'Baloo 2';font-weight:800;font-size:14px;box-shadow:0 3px 8px rgba(0,0,0,.08)}

.home:active{transform:scale(.96)}
.head{text-align:center;position:relative;padding:8px 0 14px}
.head img.hero{width:104px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.16))}
.kick{display:inline-block;font-family:'Baloo 2';font-weight:700;font-size:12px;letter-spacing:.1em;color:var(--jade);background:var(--jadeSoft);padding:4px 14px;border-radius:999px;text-transform:uppercase}
h1{font-family:'Baloo 2';font-weight:800;font-size:30px;margin-top:8px}
.wm{font-family:'Baloo 2';font-weight:700;color:var(--gold);font-size:13px;margin-top:2px}
.allbtn{margin:12px auto 0;display:flex;align-items:center;gap:8px;background:var(--jade);color:#EAFBF6;border:none;font-family:'Baloo 2';font-weight:700;font-size:15px;padding:10px 20px;border-radius:999px;box-shadow:0 4px 0 #12564C;cursor:pointer}
.allbtn svg{width:16px;height:16px;fill:currentColor}
.list{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#fff;border:2.5px solid var(--jadeLine);border-radius:20px;padding:10px 14px;cursor:pointer;font:inherit;color:inherit;transition:transform .08s,box-shadow .12s}
.row:nth-child(even){border-color:#F6B48A}
.row:active{transform:scale(.99)}
.row.playing{box-shadow:0 0 0 3px rgba(27,122,107,.25);background:var(--jadeSoft)}
.num{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--jadeSoft);color:var(--jade);font-family:'Baloo 2';font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center}
.rmasc{flex-shrink:0;width:54px;height:54px;object-fit:contain;filter:drop-shadow(0 3px 5px rgba(0,0,0,.14))}
.txt{flex:1;min-width:0;display:flex;flex-direction:column}
.thai{font-family:'Baloo 2';font-weight:700;font-size:24px;line-height:1.15}
.rom{font-style:italic;color:var(--gold);font-weight:600;font-size:13px}
.eng{color:var(--muted);font-weight:600;font-size:13px;margin-top:1px}
.play{flex-shrink:0;width:42px;height:42px;border-radius:50%;background:var(--jade);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 #12564C}
.play svg{width:20px;height:20px}
.row.playing .play{background:var(--peach);box-shadow:0 3px 0 #C96A2E}
.foot{text-align:center;margin-top:22px;color:var(--muted);font-size:12px}
.nav{display:flex;justify-content:center;gap:6px;margin-top:16px;flex-wrap:wrap}
.nav a{font-family:'Baloo 2';font-weight:700;font-size:12px;text-decoration:none;color:var(--jade);border:2px solid var(--jadeLine);border-radius:999px;padding:5px 12px}
.nav a.on{background:var(--jade);color:#fff;border-color:var(--jade)}
</style></head><body>

<script>
const rows=[...document.querySelectorAll('.row')];let audio=null,cur=-1,chain=false;
function stop(){if(audio){audio.pause();audio=null}rows.forEach(r=>r.classList.remove('playing'));cur=-1}
function play(i,ch){stop();cur=i;chain=!!ch;const r=rows[i];r.classList.add('playing');r.scrollIntoView({block:'nearest',behavior:'smooth'});audio=new Audio(r.dataset.src);audio.play();audio.onended=()=>{r.classList.remove('playing');if(chain&&i+1<rows.length)play(i+1,true);else{audio=null;cur=-1}}}
rows.forEach((r,i)=>r.addEventListener('click',()=>{if(cur===i&&!chain)stop();else play(i,false)}));
document.getElementById('all').addEventListener('click',()=>{if(chain){stop()}else play(0,true)});
</script></body></html>
